<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartStudy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="glass-card w-full max-w-md p-8 m-4 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-500">Start your learning journey</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <input type="text" id="name" required
                class="w-full px-4 py-3 rounded-xl glass-input"
                placeholder="Full Name">

            <input type="email" id="email" required
                class="w-full px-4 py-3 rounded-xl glass-input"
                placeholder="Email Address">

            <input type="password" id="password" required
                class="w-full px-4 py-3 rounded-xl glass-input"
                placeholder="Password">

            <div id="errorMsg" class="text-red-500 text-sm hidden bg-red-50 p-3 rounded-xl"></div>

            <button type="submit" class="w-full btn-primary py-3 rounded-xl font-bold text-lg">
                Sign Up
            </button>
        </form>

        <p class="text-center text-gray-500 mt-6">
            Already have an account?
            <a href="/login" class="text-indigo-600 font-semibold">Log in</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.innerText = data.error || "Registration failed";
                    errorMsg.classList.remove('hidden');
                    return;
                }

                window.location.href = "/login";

            } catch (err) {
                errorMsg.innerText = "Server error";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
