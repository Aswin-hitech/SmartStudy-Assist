<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen">
    
    <div class="glass-card w-full max-w-md p-8 m-4 fade-in">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-400">Start your AI learning journey today</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                <input type="text" id="name" required
                    class="w-full px-4 py-3 rounded-lg glass-input focus:ring-2 focus:ring-indigo-500"
                    placeholder="John Doe">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg glass-input focus:ring-2 focus:ring-indigo-500"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg glass-input focus:ring-2 focus:ring-indigo-500"
                    placeholder="••••••••">
            </div>

            <div id="errorMsg" class="text-red-400 text-sm hidden"></div>

            <button type="submit" class="w-full btn-primary py-3 rounded-lg font-bold text-lg flex justify-center items-center gap-2">
                <span>Sign Up</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6">
            Already have an account? <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium">Log in</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/login';
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Try again.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
