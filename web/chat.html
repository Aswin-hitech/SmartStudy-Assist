<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor - SmartStudy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/main.js"></script>
    <style>
        /* Additional inline styles for chat specific */
        .message-bubble {
            animation: slideInMessage 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
    </style>
</head>
<body class="flex min-h-screen p-4">
    <!-- Sidebar -->
    <aside class="w-64 glass-card m-4 p-6 hidden md:flex flex-col shadow-xl" style="background: rgba(255,255,255,0.92);">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-emerald-500 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-graduation-cap text-white text-xl"></i>
            </div>
            <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-emerald-600 bg-clip-text text-transparent">SmartStudy AI</span>
        </div>
        
        <nav class="flex flex-col gap-2 flex-grow">
            <a href="/dashboard" class="nav-item px-4 py-3 rounded-xl text-gray-600 hover:bg-white/50 transition-all flex items-center gap-3">
                <i class="fa-solid fa-chart-pie w-5"></i> Dashboard
            </a>
            <a href="/upload" class="nav-item px-4 py-3 rounded-xl text-gray-600 hover:bg-white/50 transition-all flex items-center gap-3">
                <i class="fa-solid fa-pen-nib w-5"></i> Generate Test
            </a>
            <a href="/chat" class="nav-item active px-4 py-3 rounded-xl font-medium flex items-center gap-3">
                <i class="fa-solid fa-robot w-5"></i> AI Tutor
            </a>
        </nav>

        <button onclick="logout()" class="mt-auto px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all flex items-center gap-3">
            <i class="fa-solid fa-sign-out-alt w-5"></i> Logout
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col p-4 md:p-8">
        <header class="mb-6 animate-[fadeIn_0.4s_ease-out]">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">AI Tutor</h1>
            <p class="text-gray-500 mt-1">Ask any questions or clarify doubts from your latest exam.</p>
        </header>

        <div class="flex-grow glass-card flex flex-col overflow-hidden max-w-4xl w-full h-[70vh] shadow-2xl">
            <!-- Chat History -->
            <div id="chatHistory" class="flex-grow overflow-y-auto p-6 space-y-6 custom-scrollbar">
                <!-- Initial Bot Message -->
                <div class="flex gap-4 message-bubble">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-md">
                        <i class="fa-solid fa-robot text-white"></i>
                    </div>
                    <div class="bg-white/90 border border-gray-100 p-4 rounded-2xl rounded-tl-sm shadow-sm">
                        <p class="text-gray-700">Hello! I am your AI Tutor. Let me know if you need help understanding a topic or have a question from your tests!</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-gray-100 bg-white/40">
                <form id="chatForm" class="flex gap-3">
                    <input type="text" id="chatInput" autocomplete="off" placeholder="Type your question..." 
                           class="flex-grow px-5 py-3 rounded-xl bg-white border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-all">
                    <button type="submit" id="sendBtn" class="btn-gradient w-12 h-12 rounded-xl flex items-center justify-center text-white shadow-md">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatHistory = document.getElementById('chatHistory');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 message-bubble ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = role === 'user' 
                ? `<div class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center shrink-0 shadow-md"><i class="fa-solid fa-user text-white"></i></div>`
                : `<div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-md"><i class="fa-solid fa-robot text-white"></i></div>`;
            
            const messageClass = role === 'user'
                ? `bg-gradient-to-r from-emerald-50 to-teal-50 text-gray-800 rounded-tr-sm border border-emerald-100`
                : `bg-white/90 border border-gray-100 text-gray-800 rounded-tl-sm shadow-sm`;

            // Parse markdown for bot response
            const htmlText = role === 'bot' ? marked.parse(text) : text;
            
            wrapper.innerHTML = `
                ${avatar}
                <div class="p-4 rounded-2xl ${messageClass} max-w-[80%] overflow-x-auto markdown-body">
                    ${htmlText}
                </div>
            `;
            
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function appendLoader() {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-4 message-bubble`;
            wrapper.id = 'typingIndicator';
            
            wrapper.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shrink-0 shadow-md">
                    <i class="fa-solid fa-robot text-white"></i>
                </div>
                <div class="bg-white/90 border border-gray-100 p-4 rounded-2xl rounded-tl-sm flex items-center gap-2">
                    <span class="typing-dot"></span>
                    <span class="typing-dot" style="animation-delay: 0.1s"></span>
                    <span class="typing-dot" style="animation-delay: 0.2s"></span>
                </div>
            `;
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // User message
            appendMessage('user', message);
            chatInput.value = '';
            
            // Bot typing
            appendLoader();
            sendBtn.disabled = true;
            chatInput.disabled = true;

            try {
                const data = await api('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({message})
                });
                
                // Remove typing indicator
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) typingIndicator.remove();
                
                if (data.reply) {
                    appendMessage('bot', data.reply);
                } else {
                    appendMessage('bot', "Sorry, I am facing some issues. Please try again later.");
                }
            } catch(err) {
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) typingIndicator.remove();
                appendMessage('bot', "Server Error. Could not connect to the AI model.");
            } finally {
                sendBtn.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            }
        });
    </script>
</body>
</html>
